version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    groups:
      prod-dependencies:
        dependency-type: 'production'
        patterns:
          - '*'
      dev-dependencies:
        dependency-type: 'development'
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
