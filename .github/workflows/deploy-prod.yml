name: Deploy Production Website

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  deploy:
    if: ${{ github.repository_owner == 'getarcaneapp' && github.actor != 'getarcaneappbot' }}
    runs-on: depot-ubuntu-latest
    environment:
      name: production
      url: https://getarcane.app

    steps:
      - name: Checkout arcane website repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa
        with:
          node-version: latest
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Generate content data
        run: vp run velite

      - name: Build site
        run: vp build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: vp exec wrangler deploy
