name: Deploy Production Website

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  deploy:
    if: ${{ github.repository_owner == 'getarcaneapp' && github.actor != 'getarcaneappbot' }}
    runs-on: depot-ubuntu-latest
    environment:
      name: production
      url: https://getarcane.app

    steps:
      - name: Checkout arcane website repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1
        with:
          node-version: latest
          cache: true
          run-install: false

      - name: Install dependencies
        shell: bash
        run: |
          [[ -f ~/.profile ]] && source ~/.profile
          [[ -f ~/.bashrc ]] && source ~/.bashrc
          vp install

      - name: Generate content data
        run: vp run velite

      - name: Build site
        run: vp build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: vp exec wrangler deploy
